      <stop offset="1" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e08e0b"/>
      <stop offset="1" stop-color="#b96f04"/>
